name: Release (Changesets)

on:
  push:
    branches:
      - v1

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce patch-only changesets
        run: |
          node <<'EOF'
          const { readdirSync, readFileSync } = require('node:fs');
          const { join } = require('node:path');

          const changesetDir = join(process.cwd(), '.changeset');
          const files = readdirSync(changesetDir).filter(
            (file) => file.endsWith('.md') && file !== 'README.md',
          );

          const disallowed = [];

          for (const file of files) {
            const content = readFileSync(join(changesetDir, file), 'utf8');
            const match = content.match(/---\s*([\s\S]*?)\s*---/);

            if (!match) continue;

            const frontmatter = match[1];
            const hasMinorOrMajorRelease = /^\s*['\"]?[^'\"\n]+['\"]?\s*:\s*(minor|major)\s*$/m.test(frontmatter);

            if (hasMinorOrMajorRelease) {
              disallowed.push(file);
            }
          }

          if (disallowed.length > 0) {
            console.error(
              `v1 only supports patch releases. Update these changesets to patch: ${disallowed.join(', ')}`,
            );
            process.exit(1);
          }
          EOF

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version && pnpm --filter @factus-js/docs generate:changelog
          publish: pnpm release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Publish with npm provenance for supply-chain security
          NPM_CONFIG_PROVENANCE: "true"
