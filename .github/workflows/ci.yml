name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test factus-js
        run: pnpm --filter factus-js test

      - name: Type tests (experimental)
        run: pnpm --filter factus-js test:types

      - name: Coverage
        run: pnpm --filter factus-js test:coverage

      - name: Build docs (and workspace deps)
        run: pnpm turbo run build --filter=@factus-js/docs
